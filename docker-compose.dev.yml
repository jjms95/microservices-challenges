services:
  departments-service:
    build:
      context: ./departments-service
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    develop:
      watch:
        - action: sync
          path: ./departments-service/src
          target: /app/src
        - action: rebuild
          path: ./departments-service/package.json

  employees-service:
    build:
      context: ./employees-service
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    develop:
      watch:
        - action: sync
          path: ./employees-service/src
          target: /app/src
        - action: rebuild
          path: ./employees-service/package.json
