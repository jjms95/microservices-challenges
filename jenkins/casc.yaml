jenkins:
  systemMessage: "Bienvenido al entorno Jenkins CI/CD para Microservices Challenges (Reto 6)"
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 2

unclassified:
  location:
    url: http://localhost:8080/
  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
      - name: "SonarQube"
        serverUrl: "http://sonarqube:9000"
        # Para un entorno real, usar credentialsId con un token.
        # Aquí permitiremos el primer análisis sin token estricto o lo configuraremos en Sonar manualmente.

tool:
  git:
    installations:
      - name: "Default"
        home: "git"
  nodejs:
    installations:
      - name: "NodeJS 20"
        properties:
        - installSource:
            installers:
            - nodeJSInstaller:
                id: "20.11.1"
                npmPackages: ""
                npmPackagesRefreshHours: 72
  sonarRunnerInstallation:
    installations:
      - name: "SonarScanner"
        properties:
          - installSource:
              installers:
                - sonarRunnerInstaller:
                    id: "5.0.1.3006"

# Script security is managed via in-process script approval (Manage Jenkins > In-process Script Approval).
# The globalJobDslSecurityConfiguration key requires the Job DSL plugin — omitted to avoid CASC init failure.

jobs:
  - script: |
      pipelineJob('employees-service-pipeline') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/jjms95/microservices-challenges.git')
                }
                branches('*/main')
              }
            }
            scriptPath('employees-service/Jenkinsfile')
          }
        }
        triggers {
          scm('* * * * *')
        }
      }
      pipelineJob('notifications-service-pipeline') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/jjms95/microservices-challenges.git')
                }
                branches('*/main')
              }
            }
            scriptPath('notifications-service/Jenkinsfile')
          }
        }
        triggers {
          scm('* * * * *')
        }
      }
