services:
  # ─────────────────────────────────────────────
  #  Message Broker
  # ─────────────────────────────────────────────
  message-broker:
    image: rabbitmq:3-management
    container_name: message-broker
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP protocol port
      - "15672:15672" # Management UI  →  http://localhost:15672  (admin/admin)
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  #  Databases
  # ─────────────────────────────────────────────
  database-employees:
    image: postgres:16-alpine
    container_name: database-employees
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: employees_db
    ports:
      - "5432:5432"
    volumes:
      - employees_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d employees_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  database-departments:
    image: postgres:16-alpine
    container_name: database-departments
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: departments_db
    ports:
      - "5433:5432"
    volumes:
      - departments_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d departments_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  database-notifications:
    image: postgres:16-alpine
    container_name: database-notifications
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifications_db
    ports:
      - "5434:5432"
    volumes:
      - notifications_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d notifications_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  database-profiles:
    image: postgres:16-alpine
    container_name: database-profiles
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: profiles_db
    ports:
      - "5435:5432"
    volumes:
      - profiles_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d profiles_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  database-auth:
    image: postgres:16-alpine
    container_name: database-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5436:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d auth_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  #  Microservices
  # ─────────────────────────────────────────────
  departments-service:
    build:
      context: ./departments-service
      dockerfile: Dockerfile
    container_name: departments-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_HOST: database-departments
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: departments_db
      JWT_SECRET: supersecret2026
    depends_on:
      database-departments:
        condition: service_healthy
    networks:
      - microservices-network

  employees-service:
    build:
      context: ./employees-service
      dockerfile: Dockerfile
    container_name: employees-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: database-employees
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: employees_db
      DEPARTMENTS_SERVICE_URL: http://departments-service:8081
      RABBITMQ_URL: amqp://admin:admin@message-broker:5672
      JWT_SECRET: supersecret2026
    depends_on:
      database-employees:
        condition: service_healthy
      departments-service:
        condition: service_started
      message-broker:
        condition: service_healthy
    networks:
      - microservices-network

  notifications-service:
    build:
      context: ./notifications-service
      dockerfile: Dockerfile
    container_name: notifications-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      DB_HOST: database-notifications
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: notifications_db
      RABBITMQ_URL: amqp://admin:admin@message-broker:5672
      JWT_SECRET: supersecret2026
    depends_on:
      database-notifications:
        condition: service_healthy
      message-broker:
        condition: service_healthy
    networks:
      - microservices-network

  profiles-service:
    build:
      context: ./profiles-service
      dockerfile: Dockerfile
    container_name: profiles-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      DB_HOST: database-profiles
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: profiles_db
      RABBITMQ_URL: amqp://admin:admin@message-broker:5672
      JWT_SECRET: supersecret2026
    depends_on:
      database-profiles:
        condition: service_healthy
      message-broker:
        condition: service_healthy
    networks:
      - microservices-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      DB_HOST: database-auth
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: auth_db
      RABBITMQ_URL: amqp://admin:admin@message-broker:5672
      JWT_SECRET: supersecret2026
    depends_on:
      database-auth:
        condition: service_healthy
      message-broker:
        condition: service_healthy
    networks:
      - microservices-network

# ─────────────────────────────────────────────
#  Volumes & Networks
# ─────────────────────────────────────────────
volumes:
  employees_data:
  departments_data:
  notifications_data:
  profiles_data:
  auth_data:


networks:
  microservices-network:
    driver: bridge
